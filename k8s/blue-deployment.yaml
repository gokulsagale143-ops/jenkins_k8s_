apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-blue
  labels:
    app: my-app
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
      color: blue
  template:
    metadata:
      labels:
        app: my-app
        color: blue
    spec:
      containers:
      - name: my-app
        image: my-registry/my-app:v1  # Jenkins will overwrite this tag dynamically
        ports:
        - containerPort: 8080
